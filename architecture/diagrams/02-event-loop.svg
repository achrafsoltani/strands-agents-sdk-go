<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdr2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232F3E"/>
      <stop offset="100%" stop-color="#37475A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="1100" rx="12" fill="#F8F9FA"/>

  <!-- Title -->
  <rect width="900" height="52" rx="12" fill="url(#hdr2)"/>
  <rect y="40" width="900" height="12" fill="url(#hdr2)"/>
  <text x="450" y="34" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Event Loop — Core Execution Cycle</text>

  <!-- START node -->
  <ellipse cx="450" cy="90" rx="80" ry="24" fill="#E8F5E9" stroke="#3F8624" stroke-width="2"/>
  <text x="450" y="96" text-anchor="middle" fill="#2E7D32" font-size="14" font-weight="bold">START</text>

  <!-- Arrow START → Check -->
  <line x1="450" y1="114" x2="450" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="447,145 450,153 453,145" fill="#555"/>

  <!-- Decision: Has ToolUse in latest? -->
  <polygon points="450,155 590,195 450,235 310,195" fill="#FFF3E0" stroke="#FF9900" stroke-width="2"/>
  <text x="450" y="192" text-anchor="middle" fill="#E65100" font-size="11" font-weight="600">ToolUse in</text>
  <text x="450" y="205" text-anchor="middle" fill="#E65100" font-size="11" font-weight="600">latest msg?</text>

  <!-- YES label (left) -->
  <text x="295" y="192" text-anchor="end" fill="#3F8624" font-size="12" font-weight="bold">YES</text>
  <line x1="310" y1="195" x2="200" y2="195" stroke="#3F8624" stroke-width="2"/>
  <line x1="200" y1="195" x2="200" y2="435" stroke="#3F8624" stroke-width="2"/>
  <line x1="200" y1="435" x2="310" y2="435" stroke="#3F8624" stroke-width="2"/>
  <polygon points="307,432 315,435 307,438" fill="#3F8624"/>

  <!-- NO label (down) -->
  <text x="465" y="250" fill="#d32f2f" font-size="12" font-weight="bold">NO</text>

  <!-- Arrow decision → Model Execution -->
  <line x1="450" y1="235" x2="450" y2="268" stroke="#555" stroke-width="2"/>
  <polygon points="447,265 450,273 453,265" fill="#555"/>

  <!-- Model Execution Box -->
  <rect x="290" y="275" width="320" height="70" rx="10" fill="#E3F2FD" stroke="#00A4EF" stroke-width="2"/>
  <text x="450" y="302" text-anchor="middle" fill="#1565C0" font-size="14" font-weight="bold">Model Execution</text>
  <text x="450" y="320" text-anchor="middle" fill="#555" font-size="11">BeforeModelCallEvent → Model.stream()</text>
  <text x="450" y="334" text-anchor="middle" fill="#555" font-size="11">→ AfterModelCallEvent</text>

  <!-- Retry loop annotation -->
  <rect x="650" y="278" width="180" height="44" rx="6" fill="#FFF8E1" stroke="#FFA726" stroke-width="1"/>
  <text x="740" y="296" text-anchor="middle" fill="#E65100" font-size="10" font-weight="600">Retry loop</text>
  <text x="740" y="312" text-anchor="middle" fill="#777" font-size="10">hook.retry = True</text>
  <line x1="610" y1="300" x2="645" y2="300" stroke="#FFA726" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="642,297 650,300 642,303" fill="#FFA726"/>

  <!-- Arrow Model → StopReason check -->
  <line x1="450" y1="345" x2="450" y2="378" stroke="#555" stroke-width="2"/>
  <polygon points="447,375 450,383 453,375" fill="#555"/>

  <!-- Decision: StopReason? -->
  <polygon points="450,385 600,425 450,465 300,425" fill="#FFF3E0" stroke="#FF9900" stroke-width="2"/>
  <text x="450" y="425" text-anchor="middle" fill="#E65100" font-size="12" font-weight="600">StopReason?</text>

  <!-- end_turn branch (right) -->
  <text x="618" y="418" fill="#3F8624" font-size="11" font-weight="bold">end_turn</text>
  <line x1="600" y1="425" x2="720" y2="425" stroke="#3F8624" stroke-width="2"/>
  <rect x="720" y="405" width="140" height="40" rx="8" fill="#E8F5E9" stroke="#3F8624" stroke-width="1.5"/>
  <text x="790" y="430" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="600">Return Result</text>

  <!-- max_tokens branch (left) -->
  <text x="218" y="418" text-anchor="end" fill="#d32f2f" font-size="11" font-weight="bold">max_tokens</text>
  <line x1="300" y1="425" x2="80" y2="425" stroke="#d32f2f" stroke-width="2"/>
  <rect x="40" y="405" width="170" height="40" rx="8" fill="#FFEBEE" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="125" y="425" text-anchor="middle" fill="#d32f2f" font-size="11" font-weight="600">MaxTokens</text>
  <text x="125" y="438" text-anchor="middle" fill="#d32f2f" font-size="11" font-weight="600">Exception</text>

  <!-- tool_use branch (down) -->
  <text x="465" y="480" fill="#1565C0" font-size="11" font-weight="bold">tool_use</text>
  <line x1="450" y1="465" x2="450" y2="498" stroke="#555" stroke-width="2"/>
  <polygon points="447,495 450,503 453,495" fill="#555"/>

  <!-- Validate & Prepare Tools -->
  <rect x="300" y="505" width="300" height="50" rx="8" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="450" y="528" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Validate &amp; Prepare Tool Uses</text>
  <text x="450" y="544" text-anchor="middle" fill="#777" font-size="10">Extract ToolUse blocks from message</text>

  <!-- Arrow → Execute Tools -->
  <line x1="450" y1="555" x2="450" y2="583" stroke="#555" stroke-width="2"/>
  <polygon points="447,580 450,588 453,580" fill="#555"/>

  <!-- Tool Execution Box -->
  <rect x="260" y="590" width="380" height="90" rx="10" fill="#FFF3E0" stroke="#FF9900" stroke-width="2"/>
  <text x="450" y="617" text-anchor="middle" fill="#E65100" font-size="14" font-weight="bold">Tool Execution</text>
  <text x="450" y="637" text-anchor="middle" fill="#555" font-size="11">BeforeToolCallEvent → tool.stream()</text>
  <text x="450" y="653" text-anchor="middle" fill="#555" font-size="11">→ AfterToolCallEvent</text>
  <text x="450" y="669" text-anchor="middle" fill="#999" font-size="10">Sequential or Concurrent executor</text>

  <!-- Interrupt check -->
  <line x1="450" y1="680" x2="450" y2="710" stroke="#555" stroke-width="2"/>
  <polygon points="447,707 450,715 453,707" fill="#555"/>

  <polygon points="450,720 570,752 450,784 330,752" fill="#F3E5F5" stroke="#C925D1" stroke-width="1.5"/>
  <text x="450" y="752" text-anchor="middle" fill="#7B1FA2" font-size="11" font-weight="600">Interrupts?</text>

  <!-- YES interrupt -->
  <text x="585" y="746" fill="#C925D1" font-size="11" font-weight="bold">YES</text>
  <line x1="570" y1="752" x2="680" y2="752" stroke="#C925D1" stroke-width="2"/>
  <rect x="680" y="732" width="180" height="40" rx="8" fill="#F3E5F5" stroke="#C925D1" stroke-width="1.5"/>
  <text x="770" y="752" text-anchor="middle" fill="#7B1FA2" font-size="11" font-weight="600">Save interrupt state</text>
  <text x="770" y="765" text-anchor="middle" fill="#7B1FA2" font-size="11" font-weight="600">→ Return "interrupt"</text>

  <!-- NO interrupt → append results -->
  <text x="465" y="800" fill="#555" font-size="11" font-weight="bold">NO</text>
  <line x1="450" y1="784" x2="450" y2="815" stroke="#555" stroke-width="2"/>
  <polygon points="447,812 450,820 453,812" fill="#555"/>

  <!-- Append tool results -->
  <rect x="300" y="822" width="300" height="46" rx="8" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="450" y="843" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Append Tool Results</text>
  <text x="450" y="858" text-anchor="middle" fill="#777" font-size="10">user message with toolResult blocks</text>

  <!-- Check stop flag -->
  <line x1="450" y1="868" x2="450" y2="898" stroke="#555" stroke-width="2"/>
  <polygon points="447,895 450,903 453,895" fill="#555"/>

  <polygon points="450,908 580,940 450,972 320,940" fill="#FFF3E0" stroke="#FF9900" stroke-width="1.5"/>
  <text x="450" y="937" text-anchor="middle" fill="#E65100" font-size="11" font-weight="600">stop_event_loop</text>
  <text x="450" y="950" text-anchor="middle" fill="#E65100" font-size="11" font-weight="600">flag set?</text>

  <!-- YES stop -->
  <text x="595" y="934" fill="#d32f2f" font-size="11" font-weight="bold">YES</text>
  <line x1="580" y1="940" x2="680" y2="940" stroke="#d32f2f" stroke-width="2"/>
  <rect x="680" y="920" width="160" height="40" rx="8" fill="#E8F5E9" stroke="#3F8624" stroke-width="1.5"/>
  <text x="760" y="945" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="600">Return Result</text>

  <!-- NO stop → recurse -->
  <text x="465" y="988" fill="#3F8624" font-size="11" font-weight="bold">NO</text>
  <line x1="450" y1="972" x2="450" y2="1000" stroke="#555" stroke-width="2"/>
  <polygon points="447,997 450,1005 453,997" fill="#555"/>

  <!-- Recurse -->
  <rect x="330" y="1008" width="240" height="44" rx="22" fill="#E3F2FD" stroke="#00A4EF" stroke-width="2"/>
  <text x="450" y="1035" text-anchor="middle" fill="#1565C0" font-size="13" font-weight="bold">recurse_event_loop()</text>

  <!-- Recurse arrow back up -->
  <line x1="330" y1="1030" x2="100" y2="1030" stroke="#00A4EF" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="100" y1="1030" x2="100" y2="300" stroke="#00A4EF" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="100" y1="300" x2="285" y2="300" stroke="#00A4EF" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="282,297 290,300 282,303" fill="#00A4EF"/>
  <text x="105" y="660" fill="#00A4EF" font-size="11" font-weight="600" transform="rotate(-90, 105, 660)">New cycle</text>

  <!-- Footer -->
  <text x="450" y="1085" text-anchor="middle" fill="#999" font-size="10">event_loop_cycle() — strands/event_loop/event_loop.py</text>
</svg>
