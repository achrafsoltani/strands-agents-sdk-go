<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdr7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232F3E"/>
      <stop offset="100%" stop-color="#37475A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" rx="12" fill="#F8F9FA"/>

  <!-- Title -->
  <rect width="900" height="52" rx="12" fill="url(#hdr7)"/>
  <rect y="40" width="900" height="12" fill="url(#hdr7)"/>
  <text x="450" y="34" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Session &amp; State Management</text>

  <!-- Agent -->
  <rect x="320" y="75" width="260" height="50" rx="25" fill="#FF9900" stroke="none"/>
  <text x="450" y="105" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Agent</text>

  <!-- Agent's internal state -->
  <line x1="450" y1="125" x2="450" y2="155" stroke="#555" stroke-width="2"/>
  <polygon points="447,152 450,160 453,152" fill="#555"/>

  <!-- State container -->
  <rect x="100" y="165" width="700" height="130" rx="10" fill="white" stroke="#FF9900" stroke-width="2"/>
  <text x="450" y="188" text-anchor="middle" fill="#E65100" font-size="14" font-weight="bold">Agent Internal State</text>

  <rect x="120" y="200" width="200" height="80" rx="8" fill="#E3F2FD" stroke="#00A4EF" stroke-width="1.5"/>
  <text x="220" y="222" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">messages: Messages</text>
  <text x="220" y="240" text-anchor="middle" fill="#555" font-size="10">Full conversation history</text>
  <text x="220" y="255" text-anchor="middle" fill="#555" font-size="10">user/assistant/tool messages</text>
  <text x="220" y="270" text-anchor="middle" fill="#555" font-size="10">Managed by ConversationManager</text>

  <rect x="340" y="200" width="200" height="80" rx="8" fill="#FFF3E0" stroke="#FF9900" stroke-width="1.5"/>
  <text x="440" y="222" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">state: AgentState</text>
  <text x="440" y="240" text-anchor="middle" fill="#555" font-size="10">Persistent key-value store</text>
  <text x="440" y="255" text-anchor="middle" fill="#555" font-size="10">Available to tools via context</text>
  <text x="440" y="270" text-anchor="middle" fill="#555" font-size="10">Survives across invocations</text>

  <rect x="560" y="200" width="220" height="80" rx="8" fill="#F3E5F5" stroke="#C925D1" stroke-width="1.5"/>
  <text x="670" y="222" text-anchor="middle" fill="#7B1FA2" font-size="12" font-weight="bold">system_prompt</text>
  <text x="670" y="240" text-anchor="middle" fill="#555" font-size="10">System prompt (str or blocks)</text>
  <text x="670" y="255" text-anchor="middle" fill="#555" font-size="10">Supports prompt caching</text>
  <text x="670" y="270" text-anchor="middle" fill="#555" font-size="10">SystemContentBlock list</text>

  <!-- Conversation Managers -->
  <text x="300" y="320" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">Conversation Managers</text>

  <rect x="40" y="335" width="240" height="65" rx="8" fill="white" stroke="#00A4EF" stroke-width="1.5"/>
  <text x="160" y="358" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">SlidingWindow (default)</text>
  <text x="160" y="375" text-anchor="middle" fill="#555" font-size="10">Keeps last N messages</text>
  <text x="160" y="390" text-anchor="middle" fill="#555" font-size="10">Trims on context overflow</text>

  <rect x="310" y="335" width="240" height="65" rx="8" fill="white" stroke="#3F8624" stroke-width="1.5"/>
  <text x="430" y="358" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">Summarising</text>
  <text x="430" y="375" text-anchor="middle" fill="#555" font-size="10">Summarises old messages</text>
  <text x="430" y="390" text-anchor="middle" fill="#555" font-size="10">via LLM before trimming</text>

  <rect x="580" y="335" width="200" height="65" rx="8" fill="white" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="680" y="358" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">Null</text>
  <text x="680" y="375" text-anchor="middle" fill="#555" font-size="10">No management</text>
  <text x="680" y="390" text-anchor="middle" fill="#555" font-size="10">User handles overflow</text>

  <!-- Session Managers -->
  <text x="650" y="320" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">Session Managers</text>

  <rect x="40" y="425" width="200" height="65" rx="8" fill="#E8F5E9" stroke="#3F8624" stroke-width="1.5"/>
  <text x="140" y="448" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">FileSessionManager</text>
  <text x="140" y="465" text-anchor="middle" fill="#555" font-size="10">JSON files on disk</text>
  <text x="140" y="480" text-anchor="middle" fill="#555" font-size="10">Local development</text>

  <rect x="270" y="425" width="200" height="65" rx="8" fill="#FFF3E0" stroke="#FF9900" stroke-width="1.5"/>
  <text x="370" y="448" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">S3SessionManager</text>
  <text x="370" y="465" text-anchor="middle" fill="#555" font-size="10">AWS S3 bucket storage</text>
  <text x="370" y="480" text-anchor="middle" fill="#555" font-size="10">Production, multi-region</text>

  <rect x="500" y="425" width="220" height="65" rx="8" fill="#E3F2FD" stroke="#00A4EF" stroke-width="1.5"/>
  <text x="610" y="448" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">RepositorySession</text>
  <text x="610" y="465" text-anchor="middle" fill="#555" font-size="10">Custom backend via ABC</text>
  <text x="610" y="480" text-anchor="middle" fill="#555" font-size="10">DynamoDB, Redis, etc.</text>

  <!-- Hook integration note -->
  <rect x="750" y="425" width="130" height="65" rx="8" fill="#FAFAFA" stroke="#C925D1" stroke-width="1.5"/>
  <text x="815" y="450" text-anchor="middle" fill="#7B1FA2" font-size="11" font-weight="bold">Hooks-based</text>
  <text x="815" y="467" text-anchor="middle" fill="#555" font-size="9">Registers as</text>
  <text x="815" y="480" text-anchor="middle" fill="#555" font-size="9">HookProvider</text>

  <!-- Footer -->
  <text x="450" y="525" text-anchor="middle" fill="#999" font-size="10">strands/session/ + strands/agent/conversation_manager/ — Persistence and context management</text>
</svg>
