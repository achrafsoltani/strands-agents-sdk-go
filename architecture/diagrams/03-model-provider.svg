<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdr3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232F3E"/>
      <stop offset="100%" stop-color="#37475A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" rx="12" fill="#F8F9FA"/>

  <!-- Title -->
  <rect width="960" height="52" rx="12" fill="url(#hdr3)"/>
  <rect y="40" width="960" height="12" fill="url(#hdr3)"/>
  <text x="480" y="34" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Model Provider Architecture</text>

  <!-- Abstract Model Interface Box -->
  <rect x="290" y="75" width="380" height="150" rx="10" fill="white" stroke="#00A4EF" stroke-width="2.5"/>
  <rect x="290" y="75" width="380" height="34" rx="10" fill="#00A4EF"/>
  <rect x="290" y="99" width="380" height="10" fill="#00A4EF"/>
  <text x="480" y="98" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Model (ABC)</text>

  <text x="310" y="130" fill="#333" font-size="12" font-family="'Courier New', monospace">+ stream(messages, tool_specs,</text>
  <text x="310" y="146" fill="#333" font-size="12" font-family="'Courier New', monospace">    system_prompt) → StreamEvent</text>
  <text x="310" y="166" fill="#333" font-size="12" font-family="'Courier New', monospace">+ structured_output(model, prompt)</text>
  <text x="310" y="186" fill="#333" font-size="12" font-family="'Courier New', monospace">+ update_config(**kwargs)</text>
  <text x="310" y="206" fill="#333" font-size="12" font-family="'Courier New', monospace">+ get_config() → Any</text>

  <!-- Fan-out lines from Model to providers -->
  <line x1="480" y1="225" x2="480" y2="260" stroke="#555" stroke-width="2"/>

  <!-- Horizontal connector -->
  <line x1="80" y1="260" x2="880" y2="260" stroke="#555" stroke-width="2"/>

  <!-- Vertical drops -->
  <line x1="80" y1="260" x2="80" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="77,287 80,295 83,287" fill="#555"/>

  <line x1="200" y1="260" x2="200" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="197,287 200,295 203,287" fill="#555"/>

  <line x1="320" y1="260" x2="320" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="317,287 320,295 323,287" fill="#555"/>

  <line x1="440" y1="260" x2="440" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="437,287 440,295 443,287" fill="#555"/>

  <line x1="560" y1="260" x2="560" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="557,287 560,295 563,287" fill="#555"/>

  <line x1="680" y1="260" x2="680" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="677,287 680,295 683,287" fill="#555"/>

  <line x1="800" y1="260" x2="800" y2="290" stroke="#555" stroke-width="2"/>
  <polygon points="797,287 800,295 803,287" fill="#555"/>

  <!-- Provider boxes -->
  <rect x="20" y="298" width="120" height="60" rx="8" fill="#232F3E" stroke="none"/>
  <text x="80" y="322" text-anchor="middle" fill="#FF9900" font-size="12" font-weight="bold">Bedrock</text>
  <text x="80" y="340" text-anchor="middle" fill="#AAA" font-size="9">Default provider</text>
  <text x="80" y="352" text-anchor="middle" fill="#AAA" font-size="9">bedrock.py</text>

  <rect x="148" y="298" width="106" height="60" rx="8" fill="#D4A574" stroke="none"/>
  <text x="201" y="322" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Anthropic</text>
  <text x="201" y="340" text-anchor="middle" fill="#555" font-size="9">Direct API</text>
  <text x="201" y="352" text-anchor="middle" fill="#555" font-size="9">anthropic.py</text>

  <rect x="262" y="298" width="116" height="60" rx="8" fill="#10A37F" stroke="none"/>
  <text x="320" y="322" text-anchor="middle" fill="white" font-size="12" font-weight="bold">OpenAI</text>
  <text x="320" y="340" text-anchor="middle" fill="#E0F2E0" font-size="9">Chat + Responses</text>
  <text x="320" y="352" text-anchor="middle" fill="#E0F2E0" font-size="9">openai.py</text>

  <rect x="386" y="298" width="108" height="60" rx="8" fill="#4285F4" stroke="none"/>
  <text x="440" y="322" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Gemini</text>
  <text x="440" y="340" text-anchor="middle" fill="#E3F2FD" font-size="9">Google AI</text>
  <text x="440" y="352" text-anchor="middle" fill="#E3F2FD" font-size="9">gemini.py</text>

  <rect x="502" y="298" width="116" height="60" rx="8" fill="#0078D4" stroke="none"/>
  <text x="560" y="322" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Ollama</text>
  <text x="560" y="340" text-anchor="middle" fill="#E3F2FD" font-size="9">Local models</text>
  <text x="560" y="352" text-anchor="middle" fill="#E3F2FD" font-size="9">ollama.py</text>

  <rect x="626" y="298" width="108" height="60" rx="8" fill="#6B7280" stroke="none"/>
  <text x="680" y="322" text-anchor="middle" fill="white" font-size="12" font-weight="bold">llama.cpp</text>
  <text x="680" y="340" text-anchor="middle" fill="#DDD" font-size="9">Local GGUF</text>
  <text x="680" y="352" text-anchor="middle" fill="#DDD" font-size="9">llamacpp.py</text>

  <rect x="742" y="298" width="116" height="60" rx="8" fill="#9CA3AF" stroke="none"/>
  <text x="800" y="322" text-anchor="middle" fill="white" font-size="12" font-weight="bold">LiteLLM</text>
  <text x="800" y="340" text-anchor="middle" fill="#EEE" font-size="9">100+ models</text>
  <text x="800" y="352" text-anchor="middle" fill="#EEE" font-size="9">litellm.py</text>

  <!-- Additional providers row -->
  <rect x="148" y="372" width="106" height="44" rx="8" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <text x="201" y="398" text-anchor="middle" fill="#555" font-size="11" font-weight="600">SageMaker</text>

  <rect x="262" y="372" width="116" height="44" rx="8" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <text x="320" y="398" text-anchor="middle" fill="#555" font-size="11" font-weight="600">Mistral</text>

  <rect x="386" y="372" width="108" height="44" rx="8" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <text x="440" y="398" text-anchor="middle" fill="#555" font-size="11" font-weight="600">Writer</text>

  <rect x="502" y="372" width="116" height="44" rx="8" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <text x="560" y="398" text-anchor="middle" fill="#555" font-size="11" font-weight="600">LlamaAPI</text>

  <rect x="626" y="372" width="108" height="44" rx="8" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
  <text x="680" y="398" text-anchor="middle" fill="#555" font-size="11" font-weight="600">Cohere</text>

  <!-- stream() contract detail -->
  <rect x="60" y="450" width="840" height="160" rx="10" fill="white" stroke="#00A4EF" stroke-width="1.5"/>
  <text x="480" y="475" text-anchor="middle" fill="#1565C0" font-size="14" font-weight="bold">Model.stream() Contract</text>

  <!-- Input side -->
  <rect x="80" y="492" width="220" height="100" rx="8" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="190" y="514" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">Inputs</text>
  <text x="100" y="534" fill="#555" font-size="11">messages: Messages</text>
  <text x="100" y="550" fill="#555" font-size="11">tool_specs: list[ToolSpec]</text>
  <text x="100" y="566" fill="#555" font-size="11">system_prompt: str</text>
  <text x="100" y="582" fill="#555" font-size="11">tool_choice: ToolChoice</text>

  <!-- Arrow -->
  <line x1="310" y1="540" x2="380" y2="540" stroke="#555" stroke-width="2"/>
  <polygon points="377,537 385,540 377,543" fill="#555"/>

  <!-- Processing -->
  <rect x="390" y="492" width="180" height="100" rx="8" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  <text x="480" y="514" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">Provider Logic</text>
  <text x="400" y="534" fill="#555" font-size="11">1. Format request</text>
  <text x="400" y="550" fill="#555" font-size="11">2. Send to LLM API</text>
  <text x="400" y="566" fill="#555" font-size="11">3. Parse stream chunks</text>
  <text x="400" y="582" fill="#555" font-size="11">4. Yield StreamEvents</text>

  <!-- Arrow -->
  <line x1="580" y1="540" x2="650" y2="540" stroke="#555" stroke-width="2"/>
  <polygon points="647,537 655,540 647,543" fill="#555"/>

  <!-- Output side -->
  <rect x="660" y="492" width="220" height="100" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  <text x="770" y="514" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">Outputs (StreamEvent)</text>
  <text x="680" y="534" fill="#555" font-size="11">stop_reason: StopReason</text>
  <text x="680" y="550" fill="#555" font-size="11">message: Message</text>
  <text x="680" y="566" fill="#555" font-size="11">usage: Usage (tokens)</text>
  <text x="680" y="582" fill="#555" font-size="11">metrics: Metrics (latency)</text>

  <!-- Footer -->
  <text x="480" y="630" text-anchor="middle" fill="#999" font-size="10">Each provider translates the common interface into its API's native format</text>
</svg>
